server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;

    types {
        application/javascript js;
        text/javascript mjs;
    }

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        access_log off;

        add_header Cache-Control "public, immutable";
    }
}