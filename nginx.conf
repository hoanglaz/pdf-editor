server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  types {
    application/javascript  js mjs;
    text/css               css;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \\.(js|mjs|css|png|jpg|jpeg|gif|ico|svg)$ {
    expires 30d;
    add_header Cache-Control "public, no-transform";
  }
}